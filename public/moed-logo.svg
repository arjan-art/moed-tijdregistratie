<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbb26b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a87827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8cc9f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce9837;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hard hat -->
  <g transform="translate(0, -15)">
    <!-- Hat dome -->
    <path d="M100 25 C60 25 35 55 30 85 L170 85 C165 55 140 25 100 25Z" fill="url(#hatGrad)" stroke="#6c4e19" stroke-width="2"/>
    <!-- Center ridge -->
    <path d="M100 25 L100 85" stroke="#8a6320" stroke-width="3" fill="none"/>
    <!-- Left ridge -->
    <path d="M75 30 L80 85" stroke="#8a6320" stroke-width="2" fill="none"/>
    <!-- Right ridge -->
    <path d="M125 30 L120 85" stroke="#8a6320" stroke-width="2" fill="none"/>
    <!-- Brim -->
    <ellipse cx="100" cy="88" rx="80" ry="12" fill="url(#brimGrad)" stroke="#6c4e19" stroke-width="2"/>
    <!-- Highlight -->
    <ellipse cx="85" cy="50" rx="15" ry="10" fill="#f5e6d3" opacity="0.4"/>
  </g>
  
  <!-- MOED text -->
  <text x="100" y="145" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" text-anchor="middle" fill="#4e3912" letter-spacing="3">MOED</text>
  
  <!-- Subtle underline -->
  <line x1="30" y1="155" x2="170" y2="155" stroke="#a87827" stroke-width="2" stroke-linecap="round"/>
</svg>