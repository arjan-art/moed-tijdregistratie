<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Dark blue-purple background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2a2a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </radialGradient>
    <!-- Gold gradient for the M -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d76e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8b931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9940d;stop-opacity:1" />
    </linearGradient>
    <!-- Darker gold for shadow -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9940d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a5e00;stop-opacity:1" />
    </linearGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d76e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8b931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9940d;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="93" fill="url(#bgGrad)"/>

  <!-- Inner subtle highlight ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#3a3a6a" stroke-width="1" opacity="0.5"/>

  <!-- The M / Helmet shape -->
  <g filter="url(#shadow)">
    <!-- Main M shape - stylized like a construction helmet -->
    <!-- Left pillar -->
    <path d="M55 140 L55 75 L72 75 L85 105 L85 140 L72 140 L72 105 L65 88 L55 88 Z" 
          fill="url(#goldGrad)"/>
    <!-- Right pillar -->
    <path d="M145 140 L145 75 L128 75 L115 105 L115 140 L128 140 L128 105 L135 88 L145 88 Z" 
          fill="url(#goldGrad)"/>
    <!-- Center V dip -->
    <path d="M72 75 L85 105 L100 65 L115 105 L128 75 L100 55 Z" 
          fill="url(#goldGrad)"/>
    
    <!-- Helmet brim / cap visor at top -->
    <path d="M45 72 Q100 48 155 72 L155 78 Q100 54 45 78 Z" 
          fill="url(#goldDark)"/>
    
    <!-- Center ridge line on helmet -->
    <path d="M100 55 L100 65" stroke="#8a5e00" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Side ridge lines -->
    <path d="M78 62 L85 75" stroke="#8a5e00" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M122 62 L115 75" stroke="#8a5e00" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Highlight on the M -->
  <path d="M60 80 L68 80 L75 95 L75 100 L60 100 Z" 
        fill="#ffffff" opacity="0.2"/>
  <path d="M132 80 L140 80 L140 100 L125 100 L125 95 Z" 
        fill="#ffffff" opacity="0.2"/>

  <!-- Bottom base line of helmet -->
  <rect x="50" y="138" width="100" height="6" rx="3" fill="url(#goldDark)"/>

  <!-- Small bolt/rivet details on sides -->
  <circle cx="52" cy="110" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="148" cy="110" r="2.5" fill="url(#goldGrad)"/>
</svg>
